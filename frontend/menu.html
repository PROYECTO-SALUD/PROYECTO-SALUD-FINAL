<!DOCTYPE html>
<html>
<head>
    <title>Menú</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="container">

    <img src="imagenes/logo.png" alt="Logo Agenda de Salud" class="logo">
    
    <h2>Menú Principal</h2>

    <!-- 👤 Usuario -->
    <p>Bienvenido: <span id="nombreUsuario"></span></p>

    <!-- 🔥 MENÚ PACIENTE -->
    <div id="menuPaciente" style="display:none;">
        <button onclick="window.location.href='citas.html'">Agendar Cita</button>
        <button onclick="window.location.href='historial.html'">Historia Clínica</button>
    </div>

    <!-- 🔥 MENÚ ADMIN -->
    <div id="menuAdmin" style="display:none;">
        <button onclick="window.location.href='panel_administracion.html'">Panel Admin</button>
    </div>

    <!-- 🔥 MENÚ MÉDICO -->
    <div id="menuMedico" style="display:none;">
        <button onclick="window.location.href='panel_medico.html'">Panel Médico</button>
    </div>

    <!-- 🚪 CERRAR SESIÓN -->
    <button onclick="logout()">Cerrar Sesión</button>

</div>

<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const usuario = JSON.parse(localStorage.getItem("usuario"));

    if (!usuario) {
        window.location.href = "index.html";
        return;
    }

    document.getElementById("nombreUsuario").textContent = usuario.correo;

    // 🔥 MOSTRAR SEGÚN ROL
    if (usuario.rol == 1) {
        document.getElementById("menuAdmin").style.display = "block";
    } 
    else if (usuario.rol == 2) {
        document.getElementById("menuPaciente").style.display = "block";
    } 
    else if (usuario.rol == 3) {
        document.getElementById("menuMedico").style.display = "block";
    }

});
</script>

</body>
</html>
