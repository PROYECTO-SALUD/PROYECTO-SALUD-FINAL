<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Médico - Agenda Salud</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

<div class="container">

    <h2>PANEL MÉDICO</h2>

    <p>Bienvenido: <span id="nombreMedico"></span></p>

    <!-- FORMULARIO HORARIOS -->
    <form class="formulario-horario">
        <input type="time" id="nuevoHorario" required>
        <button type="submit">Agregar Horario</button>
    </form>

    <!-- LISTA -->
    <ul class="lista-horarios"></ul>

    <!-- BOTONES -->
    <button onclick="window.location.href='menu.html'">VOLVER</button>
    <button onclick="logout()">Cerrar Sesión</button>

</div>

<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const usuario = JSON.parse(localStorage.getItem("usuario"));

    if (!usuario) {
        window.location.href = "index.html";
        return;
    }

    document.getElementById("nombreMedico").textContent = usuario.correo || "Médico";

});
</script>

</body>
</html>
